<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrailScribe Pro</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="animations.css">
</head>
<body>
    <div id="app-shell">
        <canvas id="viewport"></canvas>
        
        <div id="hud-metrics">
            <div class="hud-node" id="node-dist">
                <span class="label">DISTANCE</span>
                <span class="value" id="val-dist">0.00</span>
                <span class="unit">KM</span>
            </div>
            <div class="hud-node" id="node-asc">
                <span class="label">ASCENT</span>
                <span class="value" id="val-asc">0</span>
                <span class="unit">M</span>
            </div>
            <div class="hud-node" id="node-desc">
                <span class="label">DESCENT</span>
                <span class="value" id="val-desc">0</span>
                <span class="unit">M</span>
            </div>
            <div class="hud-node" id="node-time">
                <span class="label">DURATION</span>
                <span class="value" id="val-time">00:00:00</span>
                <span class="unit">HRS</span>
            </div>
        </div>

        <div id="ctrl-panel">
            <div class="ctrl-group">
                <label for="gpx-input" class="ctrl-btn">INGEST GPX</label>
                <input type="file" id="gpx-input" accept=".gpx" hidden>
            </div>
            <div class="ctrl-group">
                <span class="label">SIMPLIFICATION (sqEps)</span>
                <input type="range" id="sld-eps" min="0" max="100" step="0.1" value="1.0">
                <span id="val-eps">1.0</span>
            </div>
            <div class="ctrl-group">
                <button id="btn-reset" class="ctrl-btn">RESET VIEW</button>
                <button id="btn-settings" class="ctrl-btn">SETTINGS</button>
                <button id="btn-export" class="ctrl-btn">EXPORT DATA</button>
            </div>
            <div class="ctrl-group">
